name: Build And Publish to GHCR
with:
    password: ${{ secrets.DOCKER_IO_TOKEN }}
on:
  push:
    branches: main

jobs:
  Build_And_Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build And Publish ${{github.repository}}
        uses: macbre/push-to-ghcr@master
        with:
          github_token: ${{ secrets.DOCKER_IO_TOKEN  }}
          image_name: ${{ github.repository }}/frontend-ewallet